<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Arizona Fast Food</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .hero-bg { background: linear-gradient(135deg, #1a0a00 0%, #3d1a00 50%, #1a0a00 100%); }
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(192,57,43,0.2); }
    </style>
</head>

<body style="background: linear-gradient(180deg, #fff8f0 0%, #fdebd0 100%); min-height: 100vh;">

<!-- HEADER -->
<header class="hero-bg text-white text-center py-5 px-4 sticky top-0 z-50 shadow-2xl">
    <h1 class="text-3xl font-black tracking-widest text-yellow-400 mb-1">ARIZONA FAST FOOD</h1>
    <!--<p class="text-orange-200 text-xs tracking-widest mb-4 italic">Est. 2004 · Nairobi, Kenya</p> -->
    <nav>
        <ul class="flex justify-center gap-8 flex-wrap">
            <li><a href="index.html" class="text-gray-300 hover:text-yellow-400 font-semibold transition text-sm tracking-wide">HOME</a></li>
            <li><a href="menu.html"  class="text-yellow-400 font-semibold text-sm tracking-wide border-b-2 border-yellow-400 pb-1">MENU</a></li>
        </ul>
    </nav>
</header>

<main class="max-w-5xl mx-auto px-4 py-12">

    <!-- MENU HEADING -->
    <div class="text-center mb-10">
        <p class="text-red-700 text-xs tracking-widest uppercase font-semibold mb-2">Fresh & Delicious</p>
        <h2 class="text-3xl font-black text-gray-900 mb-2">Our Menu</h2>
        <!--<p class="text-gray-500 italic">Click "Add to Cart" on any item to order!</p> -->
    </div>

    <!-- MENU ITEMS -->
    <div id="menu-items" class="flex flex-wrap justify-center gap-6 mb-12"></div>

    <!-- CART -->
    <div id="cart" class="bg-white rounded-2xl shadow-lg p-6 max-w-lg mx-auto mb-6 border border-orange-100">
        <h2 class="text-xl font-black text-gray-900 text-center mb-4">Your Cart</h2>
        <p id="empty-msg" class="text-center text-gray-400 italic text-sm">Your cart is empty.</p>
    </div>

    <!-- ORDER SUMMARY -->
    <div id="order-summary" class="bg-white rounded-2xl shadow-lg p-6 max-w-lg mx-auto hidden border border-orange-100">
        <h2 class="text-xl font-black text-gray-900 text-center mb-4">Order Summary</h2>
        <div id="summary-lines"></div>
        <div id="summary-total" class="flex justify-between pt-4 font-black text-red-700 text-lg border-t border-dashed border-gray-200 mt-2"></div>
        <button onclick="goToReceipt()"
            class="mt-5 w-full bg-red-700 hover:bg-red-800 text-white font-black py-3 rounded-xl transition text-lg shadow-md">
            Pay Now
        </button>
    </div>

</main>

<!-- FOOTER -->
<footer class="hero-bg text-white text-center py-6 mt-12">
    <h3 class="text-yellow-400 font-black tracking-widest mb-1">ARIZONA FAST FOOD</h3>
    <p class="text-gray-500 text-xs mt-2">&copy; 2026 Arizona Fast Food. All rights reserved.</p>
</footer>

<!-- M-PESA MODAL -->
<div id="mpesa-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-80 p-6 text-center">
        <div class="bg-green-600 -mx-6 -mt-6 rounded-t-2xl py-4 mb-6">
            <p class="text-white font-black text-lg tracking-wide">M-PESA</p>
            <p class="text-green-100 text-sm">Safaricom</p>
        </div>
        <p class="text-gray-500 text-sm mb-1">Pay to</p>
        <p class="font-bold text-black text-base mb-1">ARIZONA FAST FOOD</p>
        <p id="mpesa-amount" class="text-green-600 font-black text-2xl mb-5"></p>
        <p class="text-gray-600 text-sm mb-2">Enter M-Pesa PIN</p>
        <input id="mpesa-pin" type="password" maxlength="4" placeholder="● ● ● ●"
            class="w-full border-2 border-gray-300 rounded-xl px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:border-green-500 mb-1">
        <p id="pin-error" class="text-red-500 text-xs mb-4 hidden">Please enter your 4-digit PIN.</p>
        <div id="mpesa-processing" class="hidden mb-4">
            <div class="inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-500 text-sm mt-2">Processing payment...</p>
        </div>
        <div id="mpesa-buttons" class="flex gap-3">
            <button onclick="cancelMpesa()"
                class="flex-1 border-2 border-gray-300 text-gray-600 font-semibold py-2 rounded-xl hover:bg-gray-100 transition">
                Cancel
            </button>
            <button onclick="confirmMpesa()"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-xl transition">
                Confirm
            </button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
