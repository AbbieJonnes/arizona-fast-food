<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Arizona Fast Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-cyan-300 min-h-screen">

<!-- HEADER -->
<header class="bg-black text-white text-center py-6 px-4 sticky top-0 z-50 shadow-lg">
    <h1 class="text-3xl font-bold tracking-widest mb-4">ARIZONA FAST FOOD</h1>
    <nav>
        <ul class="flex justify-center gap-6 flex-wrap">
            <li><a href="index.html" class="text-gray-300 hover:text-yellow-400 font-semibold transition">Home</a></li>
            <li><a href="menu.html"  class="text-yellow-400 font-semibold border-b-2 border-yellow-400">Menu</a></li>
        </ul>
    </nav>
</header>

<main class="max-w-5xl mx-auto px-4 py-12">

    <!-- MENU ITEMS -->
    <section id="menu">
        <h2 class="text-2xl font-bold italic text-black text-center mb-2">Our Menu</h2>
        <p class="text-center italic text-black mb-8">Click "Add to Cart" on any item to order!</p>
        <div id="menu-items" class="flex flex-wrap justify-center gap-6"></div>
    </section>

    <!-- CART -->
    <section class="mt-12">
        <div id="cart" class="bg-white rounded-2xl shadow-md p-6 max-w-lg mx-auto">
            <h2 class="text-xl font-bold text-black text-center mb-4">Your Cart</h2>
            <p id="empty-msg" class="text-center text-gray-400 italic">Your cart is empty.</p>
        </div>
    </section>

    <!-- ORDER SUMMARY + CHECKOUT -->
    <section class="mt-6">
        <div id="order-summary" class="bg-white rounded-2xl shadow-md p-6 max-w-lg mx-auto hidden">
            <h2 class="text-xl font-bold text-black text-center mb-4">Order Summary</h2>
            <div id="summary-lines"></div>
            <div id="summary-total" class="flex justify-between pt-4 font-bold text-red-600 text-lg"></div>
            <button onclick="goToReceipt()"
                class="mt-4 w-full bg-blue-700 hover:bg-blue-900 text-white font-bold py-3 rounded-xl transition text-lg">
                Pay Now
            </button>
        </div>
    </section>

</main>

<!-- FOOTER -->
<footer class="bg-black text-white text-center py-6 mt-12">
    <p>&copy; 2026 Arizona Fast Food. All rights reserved.</p>
</footer>

<!-- M-PESA MODAL -->
<div id="mpesa-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-80 p-6 text-center">

        <!-- M-Pesa Header -->
        <div class="bg-green-600 -mx-6 -mt-6 rounded-t-2xl py-4 mb-6">
            <p class="text-white font-bold text-lg tracking-wide">M-PESA</p>
            <p class="text-green-100 text-sm">Safaricom</p>
        </div>

        <!-- Amount -->
        <p class="text-gray-500 text-sm mb-1">Pay to</p>
        <p class="font-bold text-black text-base mb-1">ARIZONA FAST FOOD</p>
        <p id="mpesa-amount" class="text-green-600 font-bold text-2xl mb-5"></p>

        <!-- PIN Input -->
        <p class="text-gray-600 text-sm mb-2">Enter M-Pesa PIN</p>
        <input id="mpesa-pin" type="password" maxlength="4" placeholder="● ● ● ●"
            class="w-full border-2 border-gray-300 rounded-xl px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:border-green-500 mb-1">
        <p id="pin-error" class="text-red-500 text-xs mb-4 hidden">Wrong PIN. Try again.</p>

        <!-- Processing spinner (hidden by default) -->
        <div id="mpesa-processing" class="hidden mb-4">
            <div class="inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-500 text-sm mt-2">Processing payment...</p>
        </div>

        <!-- Buttons -->
        <div id="mpesa-buttons" class="flex gap-3">
            <button onclick="cancelMpesa()"
                class="flex-1 border-2 border-gray-300 text-gray-600 font-semibold py-2 rounded-xl hover:bg-gray-100 transition">
                Cancel
            </button>
            <button onclick="confirmMpesa()"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-xl transition">
                Confirm
            </button>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
