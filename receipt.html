<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt - Arizona Fast Food</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .hero-bg { background: linear-gradient(135deg, #1a0a00 0%, #3d1a00 50%, #1a0a00 100%); }
    </style>
</head>

<body class="min-h-screen flex flex-col" style="background: linear-gradient(180deg, #fff8f0 0%, #fdebd0 100%);">

<!-- HEADER -->
<header class="hero-bg text-white text-center py-6 px-4 shadow-2xl">
    <h1 class="text-3xl font-black tracking-widest text-yellow-400">ARIZONA FAST FOOD</h1>
</header>

<main class="flex-1 flex items-center justify-center px-4 py-12">

    <div id="receipt-card" class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md border border-orange-100">

        <!-- Title -->
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3">
                <span class="text-green-600 text-2xl">✓</span>
            </div>
            <h2 class="text-2xl font-black text-gray-900 mb-1">Payment Receipt</h2>
            <p class="text-green-600 font-semibold text-sm">Order Confirmed!</p>
        </div>

        <!-- Order Info -->
        <div class="border-t border-dashed border-orange-200 pt-4 mb-4 space-y-1 text-sm text-gray-600">
            <div class="flex justify-between">
                <span class="font-semibold text-gray-900">Order No:</span>
                <span id="receipt-order-no" class="font-mono"></span>
            </div>
            <div class="flex justify-between">
                <span class="font-semibold text-gray-900">Customer:</span>
                <span id="receipt-customer"></span>
            </div>
            <div class="flex justify-between">
                <span class="font-semibold text-gray-900">Date:</span>
                <span id="receipt-date"></span>
            </div>
            <div class="flex justify-between">
                <span class="font-semibold text-gray-900">Time:</span>
                <span id="receipt-time"></span>
            </div>
            <div class="flex justify-between">
                <span class="font-semibold text-gray-900">Order Type:</span>
                <span id="receipt-order-type"></span>
            </div>
            <div class="flex justify-between">
                <span class="font-semibold text-gray-900">Payment:</span>
                <span id="receipt-payment-method"></span>
            </div>
        </div>

        <!-- Destination (table or delivery address) -->
        <div id="receipt-destination" class="bg-orange-50 rounded-xl p-3 mb-4 text-sm hidden"></div>

        <!-- Items -->
        <div id="receipt-items" class="border-t border-dashed border-orange-200 pt-4 mb-4 space-y-2"></div>

        <!-- Total -->
        <div class="border-t border-orange-200 pt-4 flex justify-between font-black text-red-700 text-lg mb-6">
            <span>TOTAL</span>
            <span id="receipt-total"></span>
        </div>

        <!-- QR Code -->
        <div class="flex flex-col items-center mb-6">
            <p class="text-sm text-gray-500 mb-3">Scan QR code at the counter</p>
            <div id="qr-code" class="border-2 border-orange-100 rounded-xl p-2"></div>
        </div>

        <!-- Thank you -->
        <p class="text-center text-gray-500 text-sm italic mb-6">Thank you for your order!</p>

        <!-- Download Button -->
        <button id="download-btn" onclick="downloadReceipt()"
            class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 rounded-xl transition shadow-md mb-3 flex items-center justify-center gap-2">
            <i class="fas fa-download"></i> Download Receipt
        </button>

        <!-- Buttons -->
        <div class="grid grid-cols-2 gap-3">
            <a href="index.html"
               class="block text-center bg-white border-2 border-red-700 text-red-700 hover:bg-red-50 font-bold py-3 rounded-xl transition">
                Back to Home
            </a>
            <a href="menu.html"
               class="block text-center bg-red-700 hover:bg-red-800 text-white font-bold py-3 rounded-xl transition shadow-md">
                Order Again
            </a>
        </div>

    </div>

</main>

<!-- FOOTER -->
<footer class="hero-bg text-white text-center py-4">
    <p class="text-gray-400 text-xs">&copy; 2026 Arizona Fast Food. All rights reserved.</p>
</footer>

<script>
    const order = JSON.parse(localStorage.getItem("arizona_order"));
    const currentUser = JSON.parse(localStorage.getItem("arizona_current_user") || "null");

    if (!order) {
        window.location.href = "menu.html";
    } else {
        const now = new Date();

        document.getElementById("receipt-order-no").textContent = order.orderNo;
        document.getElementById("receipt-customer").textContent = currentUser ? currentUser.name : "Guest";
        document.getElementById("receipt-date").textContent = now.toLocaleDateString();
        document.getElementById("receipt-time").textContent = now.toLocaleTimeString();
        document.getElementById("receipt-payment-method").textContent = order.paymentMethod === "Cash"
            ? "Cash (Pay on arrival)"
            : (order.paymentMethod || "M-Pesa");

        // Order type + destination
        const orderMode = order.orderMode || {};
        const orderTypeEl = document.getElementById("receipt-order-type");
        const destinationEl = document.getElementById("receipt-destination");

        if (orderMode.type === "dinein") {
            orderTypeEl.textContent = "Dine-in";
            destinationEl.classList.remove("hidden");
            destinationEl.innerHTML = `<i class="fas fa-chair text-red-700"></i> <span class="font-semibold text-gray-900">Table ${orderMode.tableNumber}</span>`;
        } else if (orderMode.type === "delivery") {
            orderTypeEl.textContent = "Delivery";
            destinationEl.classList.remove("hidden");
            destinationEl.innerHTML = `<i class="fas fa-motorcycle text-red-700"></i> <span class="font-semibold text-gray-900">${orderMode.address}</span><br><span class="text-gray-500 text-xs">Phone: ${orderMode.phone}</span>`;
        } else {
            orderTypeEl.textContent = "—";
        }

        const itemsDiv = document.getElementById("receipt-items");
        order.cart.forEach(item => {
            const qty = item.qty || 1;
            itemsDiv.innerHTML += `
                <div class="flex justify-between text-gray-900 text-sm">
                    <span>${item.name} ${qty > 1 ? `x${qty}` : ""}</span>
                    <span>Ksh ${item.price * qty}</span>
                </div>
            `;
        });

        // Show subtotal + delivery fee if applicable
        if (orderMode.type === "delivery" && order.deliveryFee) {
            itemsDiv.innerHTML += `
                <div class="flex justify-between text-gray-500 text-sm pt-2 border-t border-dashed border-orange-200">
                    <span>Subtotal</span>
                    <span>Ksh ${order.subtotal}</span>
                </div>
                <div class="flex justify-between text-gray-500 text-sm">
                    <span>Delivery Fee</span>
                    <span>Ksh ${order.deliveryFee}</span>
                </div>
            `;
        }

        document.getElementById("receipt-total").textContent = `Ksh ${order.total}`;

        const qrData = `ARIZONA FAST FOOD | Order: ${order.orderNo} | Total: Ksh ${order.total} | Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}`;

        new QRCode(document.getElementById("qr-code"), {
            text: qrData,
            width: 180,
            height: 180,
            colorDark: "#000000",
            colorLight: "#ffffff"
        });

        localStorage.removeItem("arizona_order");
    }

    // =====================
    // DOWNLOAD RECEIPT AS PDF
    // =====================
    function downloadReceipt() {
        const card = document.getElementById("receipt-card");
        const downloadBtn = document.getElementById("download-btn");
        const actionButtons = document.querySelector(".grid.grid-cols-2.gap-3");

        // Hide buttons so they don't appear in the PDF
        downloadBtn.style.display = "none";
        actionButtons.style.display = "none";

        html2canvas(card, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            // Show buttons again
            downloadBtn.style.display = "flex";
            actionButtons.style.display = "grid";

            const imgData = canvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;

            const pdfWidth = 210; // A4 width in mm
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

            const pdf = new jsPDF("p", "mm", "a4");
            pdf.addImage(imgData, "PNG", 0, 10, pdfWidth, pdfHeight);

            const orderNo = order ? order.orderNo : "receipt";
            pdf.save(`Arizona-Receipt-${orderNo}.pdf`);
        });
    }
</script>
<script src="chatbot.js"></script>

</body>
</html>
